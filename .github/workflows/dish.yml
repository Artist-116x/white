name: dish
on:
  push:
    branches: [ "main" ]

jobs:
    moral_geez:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: moral_geez
          run: |
            npm install
            timeout 313m node dish.js
  
